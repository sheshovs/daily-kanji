[build]
  command = "yarn build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["node_modules/@resvg/resvg-wasm/index_bg.wasm", "netlify/functions/fonts/*"]

[[redirects]]
  from = "/api/kanji-image"
  to = "/.netlify/functions/kanji-image"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
